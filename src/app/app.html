<df-splash-screen [isReady]="isAppReady()" />
<df-pwa-install-banner />

@if (!networkService.isOnline()) {
  <!-- Banner offline sutil — NO bloquea la navegación si hay caché -->
  <div class="fixed bottom-20 md:bottom-4 left-1/2 -translate-x-1/2 z-200 flex items-center gap-3 bg-zinc-900/95 backdrop-blur-md border border-white/10 rounded-full px-5 py-2.5 shadow-2xl text-sm font-semibold text-white animate-fade-in pointer-events-none">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-[#e50914] shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 00-12.728 0M15.536 8.464a5 5 0 00-7.072 0M12 12v.01" />
    </svg>
    <span class="text-gray-300">Sin conexión — mostrando contenido guardado</span>
  </div>
}

<df-progress-bar />

@if (!isProfilesPage()) {
  <df-top-nav />
}

<div [class.pt-16]="!isProfilesPage()" 
     [class.md:pt-20]="!isProfilesPage()"
     [class.pb-16]="!isProfilesPage() && networkService.isOnline()" 
     [class.md:pb-0]="!isProfilesPage()"
     class="min-h-screen bg-df-background text-white">
  <router-outlet />
</div>

@if (!isProfilesPage()) {
  <df-bottom-nav />
}
