@if (networkService.isOnline()) {
  <df-progress-bar />
  <df-top-nav />
  <div class="pb-16 md:pb-0 min-h-screen bg-df-background text-white pt-16 md:pt-20">
    <router-outlet />
  </div>
  <df-bottom-nav />
} @else {
  <div class="h-screen w-screen bg-df-background flex flex-col items-center justify-center text-white px-4">
    <div class="w-40 h-40 bg-zinc-900 rounded-full flex justify-center items-center mb-8 pulse shadow-[0_0_50px_rgba(229,9,20,0.2)] relative">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-20 w-20 text-[#e50914] z-10" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 3l18 18M18.364 5.636a9 9 0 00-12.728 0M16.95 7.05a7 7 0 00-9.9 0M15.536 8.464a5 5 0 00-7.072 0m2.828 2.828a1 1 0 00-1.414 0" />
      </svg>
      <div class="absolute inset-0 bg-[#e50914]/10 rounded-full animate-ping"></div>
    </div>

    <h1 class="text-3xl md:text-5xl font-black mb-4 text-center tracking-tighter">Sin conexión a red</h1>
    <p class="text-gray-400 text-center text-lg max-w-md mb-10 leading-relaxed font-medium">Parece que estás fuera del radar. No te preocupes, seguiremos intentando conectarnos automáticamente mientras estés aquí.</p>

    <div class="flex flex-col sm:flex-row gap-4 items-center justify-center w-full">
      <button class="bg-[#e50914] hover:bg-red-700 font-bold py-4 px-10 rounded-lg shadow-lg hover:scale-105 active:scale-95 transition-all text-white max-w-75 w-full disabled:opacity-50"
              onclick="window.location.reload()">
        Reintentar Conexión
      </button>
    </div>
  </div>
}
